name: Guardrails

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  guardrails:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Hard-rule guardrail checks
        run: npm run lint:guardrails
      - name: Type-check
        run: npm run check
